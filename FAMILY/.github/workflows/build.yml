name: Build FamilyModel

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pygame numpy matplotlib
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "FamilyModel_v0.7" main.py
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FamilyModel-${{ matrix.os }}
        path: dist/
