name: Mirror to GitFlic

on: [push, delete, create]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: yesolutions/mirror-action@master
        with:
          REMOTE: https://gitflic.ru/project/mtt-klyueva/familymodel.git
          GIT_USERNAME: 'ваш_логин_на_gitflic'
          GIT_PASSWORD: ${{ secrets.GITFLIC_TOKEN }}
