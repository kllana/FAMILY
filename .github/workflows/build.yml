name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller pygame numpy matplotlib
    
    - name: Build with PyInstaller
      shell: bash
      run: |
        cd FAMILY
        # Очищаем версию от точек
        VERSION_CLEAN="${{ github.ref_name }}"
        VERSION_CLEAN=${VERSION_CLEAN//./-}
        
        pyinstaller --onefile --windowed --name "FamilyModel_${VERSION_CLEAN}" main.py
        
        # Переименовываем файлы с указанием ОС
        cd dist
        
        if [ -f "FamilyModel_${VERSION_CLEAN}" ]; then
          mv "FamilyModel_${VERSION_CLEAN}" "FamilyModel_${VERSION_CLEAN}_linux"
        fi
        if [ -f "FamilyModel_${VERSION_CLEAN}.exe" ]; then
          mv "FamilyModel_${VERSION_CLEAN}.exe" "FamilyModel_${VERSION_CLEAN}_windows.exe"
        fi
        if [ -d "FamilyModel_${VERSION_CLEAN}.app" ]; then
          mv "FamilyModel_${VERSION_CLEAN}.app" "FamilyModel_${VERSION_CLEAN}_macos.app"
        fi
        
        echo "Built files:"
        ls -la
    
    - name: Upload artifact (raw)
      uses: actions/upload-artifact@v4
      with:
        name: FamilyModel-${{ matrix.os }}-raw
        path: FAMILY/dist/

  package:
    name: Package artifacts to ZIP
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create ZIP archives
      run: |
        cd artifacts
        for dir in */; do
          dir_name="${dir%/}"
          echo "Packaging ${dir_name}..."
          zip -r "${dir_name}.zip" "$dir_name"
        done
        echo "ZIP archives created:"
        ls -la *.zip
    
    - name: Upload ZIP artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zipped-releases
        path: artifacts/*.zip

  release:
    name: Create Release
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Download ZIP artifacts
      uses: actions/download-artifact@v4
      with:
        name: zipped-releases
        path: zips
    
    - name: List ZIP files (debug)
      run: |
        echo "ZIP files:"
        ls -la zips/
    
    - name: Create Release and upload ZIPs
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ github.ref_name }}
        overwrite_files: true
        body: |
          ## Релиз ${{ github.ref_name }}
          
