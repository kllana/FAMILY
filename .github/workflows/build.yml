name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller pygame numpy matplotlib
    
    - name: Build with PyInstaller
      shell: bash
      run: |
        cd FAMILY
        VERSION_CLEAN="${{ github.ref_name }}"
        VERSION_CLEAN=${VERSION_CLEAN//./-}
        
        pyinstaller --onefile --windowed --name "FamilyModel_${VERSION_CLEAN}" main.py
        
        cd dist
        
        if [ -f "FamilyModel_${VERSION_CLEAN}" ]; then
          mv "FamilyModel_${VERSION_CLEAN}" "FamilyModel_${VERSION_CLEAN}_linux"
        fi
        if [ -f "FamilyModel_${VERSION_CLEAN}.exe" ]; then
          mv "FamilyModel_${VERSION_CLEAN}.exe" "FamilyModel_${VERSION_CLEAN}_windows.exe"
        fi
        if [ -d "FamilyModel_${VERSION_CLEAN}.app" ]; then
          mv "FamilyModel_${VERSION_CLEAN}.app" "FamilyModel_${VERSION_CLEAN}_macos.app"
        fi
        
        echo "Built files:"
        ls -la
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FamilyModel-${{ matrix.os }}-raw
        path: FAMILY/dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create ZIP archives and upload directly
      run: |
        cd artifacts
        # Создаём ZIP-архивы
        for dir in */; do
          dir_name="${dir%/}"
          echo "Packaging ${dir_name}..."
          zip -r "${dir_name}.zip" "$dir_name"
        done
        echo "ZIP files created:"
        ls -la *.zip
        
        # Подготовка к загрузке — копируем ZIP-файлы в отдельную папку с правильными именами
        mkdir -p ../release_files
        cp *.zip ../release_files/
        cd ../release_files
        echo "Files to upload:"
        ls -la
    
    - name: Create Release and upload ZIPs
      uses: softprops/action-gh-release@v2
      with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Релиз ${{ github.ref_name }}
            
            ### 📥 Скачайте архив для вашей ОС:
            
            | Операционная система | Архив |
            |---------------------|-------|
            | 🪟 **Windows** | `FamilyModel-windows-latest-raw.zip` |
            | 🐧 **Linux** | `FamilyModel-ubuntu-latest-raw.zip` |
            | 🍎 **macOS** | `FamilyModel-macos-latest-raw.zip` |
          files: |
            release_files/FamilyModel-ubuntu-latest-raw.zip
            release_files/FamilyModel-windows-latest-raw.zip
            release_files/FamilyModel-macos-latest-raw.zip
          overwrite_files: true   # <--- правильный параметр
          draft: false
          prerelease: false
              
