name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller pygame numpy matplotlib
    
    - name: Build with PyInstaller
      run: |
        cd FAMILY
        pyinstaller --onefile --windowed --name "FamilyModel_${{ github.ref_name }}" main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FamilyModel-${{ matrix.os }}
        path: FAMILY/dist/FamilyModel_${{ github.ref_name }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release and upload assets
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ github.ref_name }}
        body: |
          ## Релиз ${{ github.ref_name }}

        files: |
          artifacts/FamilyModel-ubuntu-latest/FamilyModel_*
          artifacts/FamilyModel-windows-latest/FamilyModel_*.exe
          artifacts/FamilyModel-macos-latest/FamilyModel_*
        draft: false
        prerelease: false
        generate_release_notes: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
