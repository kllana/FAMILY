name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller pygame numpy matplotlib
    
    - name: Build with PyInstaller
      run: |
        cd FAMILY
        pyinstaller --onefile --windowed --name "FamilyModel_${{ github.ref_name }}" main.py
        # Выводим список файлов для отладки
        ls -la dist/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FamilyModel-${{ matrix.os }}
        path: FAMILY/dist/FamilyModel_${{ github.ref_name }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: List downloaded files (debug)
      run: |
        ls -la artifacts/
        find artifacts/ -type f
    
    - name: Create Release and upload assets
      uses: softprops/action-gh-release@v1
      with:
        name: ${{ github.ref_name }}
        body: |
          ## Релиз ${{ github.ref_name }}
          
          ### Установка
          1. Скачайте файл для вашей ОС
          2. Запустите его
        files: |
          artifacts/FamilyModel-ubuntu-latest/*
          artifacts/FamilyModel-windows-latest/*
          artifacts/FamilyModel-macos-latest/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
