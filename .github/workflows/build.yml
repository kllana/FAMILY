name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller pygame numpy matplotlib
    
    - name: Build with PyInstaller
      run: |
        cd FAMILY
        pyinstaller --onefile --windowed --name "FamilyModel_${{ github.ref_name }}" main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FamilyModel-${{ matrix.os }}
        path: FAMILY/dist/FamilyModel_${{ github.ref_name }}*

  release:
    name: Create Release
    needs: build  # Ждём завершения всех сборок
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Нужно для создания релиза
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release and upload assets
      uses: softprops/action-gh-release@v1
      with:
        name: ${{ github.ref_name }}
        body: |
          ## Релиз ${{ github.ref_name }}
          
          ### Установка
          1. Скачайте файл для вашей ОС
          2. Запустите его
          
          ### Изменения в этой версии
          - Автоматическая сборка для всех платформ
          - Исправлена передача параметров кризиса
          - Улучшена стабильность при выходе
        files: |
          artifacts/FamilyModel-ubuntu-latest/*
          artifacts/FamilyModel-windows-latest/*
          artifacts/FamilyModel-macos-latest/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
